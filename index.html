<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Rubik:wght@400;500;700&family=Unbounded:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-art" aria-hidden="true">
      <span class="orb orb-red"></span>
      <span class="orb orb-green"></span>
      <span class="grid-noise"></span>
    </div>

    <main class="app-shell">
      <section class="screen active" id="homeScreen">
        <header class="hero">
          <h1>Выбор теста</h1>
        </header>
        <div class="test-grid" id="testGrid"></div>
      </section>

      <section class="screen" id="testScreen">
        <div class="sticky-panel">
          <div class="sticky-top">
            <button class="ghost-btn" id="backHomeBtn" type="button">К тестам</button>
            <p class="test-title" id="testTitle"></p>
          </div>
          <div class="meta-row">
            <div class="meta-card">
              <span>Секундомер</span>
              <strong id="timerLabel">00:00</strong>
            </div>
            <div class="meta-card">
              <span>Вопросы</span>
              <strong id="questionCounter">0 / 0</strong>
            </div>
            <div class="meta-card">
              <span>Правильных</span>
              <strong id="correctCounter">0</strong>
            </div>
          </div>
        </div>

        <div class="question-list" id="questionList"></div>
        <div class="end-actions">
          <button class="primary-btn end-restart-btn" id="restartFromTestBtn" type="button">Начать заново</button>
        </div>
      </section>

      <section class="screen" id="resultScreen">
        <article class="result-card">
          <p class="hero-kicker">Готово</p>
          <h2>Отчёт по тесту</h2>
          <div class="result-grid">
            <div class="result-stat green">
              <span>Правильных</span>
              <strong id="reportCorrect">0</strong>
            </div>
            <div class="result-stat red">
              <span>Ошибок</span>
              <strong id="reportWrong">0</strong>
            </div>
          </div>
          <p class="result-line" id="reportTime">Время: 00:00</p>
          <div class="result-actions">
            <button class="primary-btn" id="restartBtn" type="button">Начать заново</button>
            <button class="ghost-btn" id="toHomeBtn" type="button">К выбору теста</button>
          </div>
        </article>
      </section>
    </main>

    <script src="data/tests/ict.js"></script>
    <script src="app.js"></script>
  </body>
</html>
